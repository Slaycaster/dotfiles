"$schema" = "https://starship.rs/config-schema.json"

format = """
[](fg:#7aa2f7)\
$os\
[](bg:#7dcfff fg:#7aa2f7)\
$directory\
[](fg:#7dcfff bg:#3b4261)\
${custom.git_host}\
$git_branch\
$git_status\
[](fg:#3b4261 bg:#292e42)\
$nodejs\
$rust\
$python\
$golang\
$lua\
[](fg:#292e42)\
$fill\
$cmd_duration\
$line_break\
$character"""

palette = "tokyonight"

[palettes.tokyonight]
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
yellow = "#e0af68"
fg = "#a9b1d6"
bg = "#1a1b26"
surface = "#292e42"
overlay = "#3b4261"

[os]
disabled = false
style = "bg:#7aa2f7 fg:#1a1b26"

[os.symbols]
Debian = " "
Ubuntu = " "
Linux = " "
Windows = "󰍲 "

[directory]
style = "bg:#7dcfff fg:#1a1b26"
format = "[ $path ]($style)"
truncate_to_repo = false
truncation_length = 0
fish_style_pwd_dir_length = 0

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[custom.git_host]
command = """
URL=$(git remote get-url origin 2>/dev/null) || exit 1
case "$URL" in
  *gitlab*) echo " " ;;
  *github*) echo " " ;;
  *bitbucket*) echo " " ;;
  *) echo " " ;;
esac
"""
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--noprofile", "--norc"]
style = "bg:#3b4261 fg:#a9b1d6"
format = "[$output]($style)"

[git_branch]
symbol = ""
style = "bg:#3b4261 fg:#a9b1d6"
format = "[$symbol $branch ]($style)"

[git_status]
style = "bg:#3b4261 fg:#a9b1d6"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
symbol = ""
style = "bg:#292e42 fg:#9ece6a"
format = "[ $symbol ]($style)"

[rust]
symbol = ""
style = "bg:#292e42 fg:#f7768e"
format = "[ $symbol ]($style)"

[python]
symbol = ""
style = "bg:#292e42 fg:#e0af68"
format = "[ $symbol ]($style)"

[golang]
symbol = ""
style = "bg:#292e42 fg:#7dcfff"
format = "[ $symbol ]($style)"

[lua]
symbol = ""
style = "bg:#292e42 fg:#7aa2f7"
format = "[ $symbol ]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time = 2_000
format = "[ $duration]($style)"
style = "fg:#565f89"

[character]
success_symbol = "[❯](bold fg:#7aa2f7)"
error_symbol = "[❯](bold fg:#f7768e)"
