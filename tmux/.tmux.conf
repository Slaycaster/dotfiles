# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

# -- Prefix --
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Vim-style pane navigation --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Splits (open in current path) --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# -- Resize panes --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- New window in current path --
bind c new-window -c "#{pane_current_path}"

# -- Reload config --
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# -- Copy mode (vi) --
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# -- Tokyo Night Theme --
# Status bar
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#7aa2f7,bg=#1a1b26,bold]  #S #[fg=#1a1b26,bg=default] "
set -g status-right "#[fg=#565f89]  %Y-%m-%d #[fg=#7aa2f7]  %H:%M #[fg=#9ece6a,bold] #h "
set -g status-interval 5

# Window status
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#292e42,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "bg=#292e42,fg=#7aa2f7"
set -g message-command-style "bg=#292e42,fg=#7aa2f7"

# Clock
setw -g clock-mode-colour "#7aa2f7"

# -- Plugins (TPM) --
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g set-titles on
set -g set-titles-string "#{pane_current_command} - #{pane_current_path}"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
